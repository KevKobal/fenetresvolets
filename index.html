*{box-sizing:border-box}
body{margin:0}

.aurora-btn::after{content:'';position:absolute;inset:0;z-index:-1;border-radius:10px;background:#0c0e13}

/* scroll velocity (d'après 21st.dev — Edil-ozi/scroll-velocity) — texte défilant réactif au scroll */

function moteurName(k){  return ({sangle:'Manuel sangle',treuil:'Treuil manivelle',filaire:'Électrique filaire',radio:'Radio télécommande',solaire:'Solaire autonome'})[k]||k; }

// interpolation linéaire (avec extrapolation) du prix fenêtre sur la surface
function lerpFen(anchors, key, s){
  const n = anchors.length, first = anchors[0], last = anchors[n-1];
  if(s <= first.s){ const b = anchors[1]; return first[key] + (b[key]-first[key])/(b.s-first.s)*(s-first.s); }
  for(let i=0;i<n-1;i++){ const a = anchors[i], b = anchors[i+1]; if(s <= b.s){ return a[key] + (b[key]-a[key])*(s-a.s)/(b.s-a.s); } }
  const a = anchors[n-2]; return last[key] + (last[key]-a[key])/(last.s-a.s)*(s-last.s);
}

function priceFor(g, c){
  const w = c.w||1000, h = c.h||1000, surf = Math.max(0.9,(w*h)/1e6);
  if(g === 'volet'){
    let ppm = ({sangle:95,treuil:120,filaire:175,radio:225,solaire:320})[c.moteur]||175;
    if(c.lames === 'alu') ppm += 30;
    if(c.moteur === 'solaire') ppm += (BUBENDORFF.gammes[c.gamme]||{}).add||0; // supplément gamme Bubendorff
    let p = ppm * surf;
    if(!['blanc','gris'].includes(c.couleur)) p *= 1.08;
    return Math.round(p/5)*5;
  } else {
    const surfF = (w*h)/1e6;                                   // surface réelle (sans plancher)
    const type  = c.ouverture === '2v' ? '2v' : '1v';          // 1v, oscillo, fixe → grille 1 vantail
    const key   = c.couleur === 'blanc' ? 'blanc' : (c.faces === '1' ? 'f1' : 'f2');
    let p = lerpFen(FEN_PRIX[type], key, surfF);
    if(c.ouverture === 'fixe') p /= 1.5;                        // châssis fixe = prix 1 vantail ÷ 1,5
    if(c.vitrage === 'triple') p += FEN_TRIPLE_M2 * Math.max(0.9, surfF); // supplément triple vitrage
    if(c.seuil === 'oui') p += FEN_SEUIL;                       // option seuil alu 20 mm
    if(c.grille === 'oui') p += FEN_GRILLE;                     // option grille de ventilation
    return Math.max(0, Math.round(p));
  }
}

function totals(){
  const sub = S.cart.reduce((a,i) => a+i.total, 0);
  const menuiserieQty = S.cart.filter(i => i.product === 'volet' || i.product === 'fenetre').reduce((a,i) => a+i.qty, 0);
  const hasPieces = S.cart.some(i => i.product === 'piece');

  // frais de port selon le contenu de la commande
  let livraison = 0;
  if(sub > 0){
    if(menuiserieQty >= 2)      livraison = FRAIS_PLUS;   // 2 menuiseries ou plus
    else if(menuiserieQty === 1) livraison = FRAIS_1;     // 1 fenêtre ou 1 volet
    else if(hasPieces)           livraison = FRAIS_PIECES; // pièces détachées seules
  }
  const gratuite = sub >= LIVRAISON_SEUIL && sub > 0;
  if(gratuite) livraison = 0;

  // délai de base (semaines) + option Livraison Flash
  const baseWeeks = menuiserieQty > 0 ? DELAI_MENUISERIE : (hasPieces ? DELAI_PIECES : 0);
  const canFlash = baseWeeks > DELAI_FLASH && sub > 0;       // n'a de sens que si > 3 semaines
  const flashActive = canFlash && S.flash;
  const flash = flashActive ? Math.round(sub * FLASH_PCT) : 0;
  const weeks = flashActive ? DELAI_FLASH : baseWeeks;

  const total = sub + livraison + flash;
  const ht = total/1.2, tva = total - ht;
  return { sub, livraison, flash, flashActive, canFlash, total, ht, tva, gratuite, menuiserieQty, hasPieces, weeks, baseWeeks };
}

function itemTitle(it){
  if(it.product === 'piece') return it.name;
  if(it.product === 'volet'){
    const brand = it.cfg.moteur === 'solaire' ? ' Bubendorff' : '';
    return `Volet roulant ${couleurName(it.cfg.couleur).split(' ')[0].toLowerCase()}${brand}`;
  }
  const brand = it.cfg.matiere === 'pvc' ? ' Kömmerling 76' : '';
  return `Fenêtre ${matiereName(it.cfg.matiere)}${brand} ${ouvertureName(it.cfg.ouverture).toLowerCase()}`;
}
function itemSub(it){
  if(it.product === 'piece') return 'Pièce Bubendorff · ' + (it.cat||'accessoire');
  if(it.product === 'volet'){
    const g = it.cfg.moteur === 'solaire' ? gammeName(it.cfg.gamme)+' · ' : '';
    return `${it.cfg.w}×${it.cfg.h} mm · ${g}${moteurName(it.cfg.moteur)} · pose ${poseName(it.cfg.pose)} · ${couleurName(it.cfg.couleur)}`;
  }
  const p = it.cfg.matiere === 'pvc' ? profilName(it.cfg.profil)+' · ' : '';
  const f = it.cfg.couleur !== 'blanc' ? ' · '+facesName(it.cfg.faces) : '';
  const sl = it.cfg.seuil === 'oui' ? ' · seuil 20 mm' : '';
  const gr = it.cfg.grille === 'oui' ? ' · grille ventilation' : '';
  const pg = it.cfg.ouverture !== 'fixe' && it.cfg.poignee ? ` · poignée ${it.cfg.poignee} mm` : '';
  return `${it.cfg.w}×${it.cfg.h} mm · ${p}${vitrageName(it.cfg.vitrage)} · ${couleurName(it.cfg.couleur)}${f}${sl}${gr}${pg}`;
}
function cliValid(){
  const c = S.client;
  return c.nom.trim() && c.prenom.trim() && c.adresse.trim() && /^\d{5}$/.test(c.cp.trim()) &&
         c.ville.trim() && c.tel.replace(/\D/g,'').length >= 9 && /^\S+@\S+\.\S+$/.test(c.mail.trim());
}

  return cliValid() && S.payCard.replace(/\D/g,'').length >= 15 && S.payExp.length >= 4 && S.payCvc.length >= 3 && S.payName.trim().length > 2;
}

function addPiece(id){
  const p = findPiece(id); if(!p) return;
  const existing = S.cart.find(i => i.product === 'piece' && i.pieceId === id);
  if(existing){
    S.cart = S.cart.map(i => i === existing ? {...i, qty:i.qty+1, total:i.unit*(i.qty+1)} : i);
  } else {
    S.cart = [...S.cart, {id: Date.now()+'-'+Math.floor(Math.random()*999), product:'piece', pieceId:id, name:p.name, cat:pieceCat(id), img:p.img, unit:p.price, qty:1, total:p.price}];

function onPay(){
  if(!payValid()){ S.checkoutError = true; window.scrollTo(0,0); render(); return; }
  const T = totals();
  const no = 'MFV-2026-'+Math.floor(1000+Math.random()*9000);
  const weeks = T.weeks || DELAI_MENUISERIE;
  const eta = new Date(Date.now()+weeks*7*864e5).toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  S.lastOrder = {no, eta, weeks, flash:T.flashActive, total:T.total, items:[...S.cart], client:{...S.client}};
  S.cart = []; S.flash = false; S.screen = 'confirm'; S.checkoutError = false;
  S.payCard = ''; S.payExp = ''; S.payCvc = ''; S.payName = '';
  window.scrollTo(0,0);
  render();

function cardStyle(sel){
  const base = 'border:1.5px solid var(--line);border-radius:10px;padding:14px 15px;cursor:pointer;background:var(--section);transition:all .15s;';
  return sel ? base+'border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 1px var(--accent) inset;' : base;
}

function optCards(g, key, opts){
  return opts.map(o => {
    const sel = S[g][key] === o.key;
    const price = o.price ? `<span style="font-size:12.5px;font-weight:600;color:var(--accent)">${o.price}</span>` : '';
    const desc  = o.desc  ? `<div style="font-size:12.5px;color:var(--muted);line-height:1.4;margin-top:3px">${o.desc}</div>` : '';
    return `<div onclick="setField('${g}','${key}','${o.key}')" style="${cardStyle(sel)}">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:14.5px;font-weight:700;color:var(--ink)">${o.label}</span>${price}
      </div>${desc}
    </div>`;
  }).join('');
}

function toggleCards(g, key, opts){
  return opts.map(o => {
    const sel = S[g][key] === o.key;
    return `<div onclick="setField('${g}','${key}','${o.key}')" style="${cardStyle(sel)}flex:1;text-align:center">
      <div style="font-size:14px;font-weight:700;color:var(--ink)">${o.label}</div>

}

    ['Couleur',    couleurName(cur.couleur)],
    ...(cur.couleur !== 'blanc' ? [['Application', facesName(cur.faces)]] : []),
    ...(cur.seuil === 'oui' ? [['Seuil', 'Alu 20 mm']] : []),
    ...(cur.grille === 'oui' ? [['Ventilation', 'Grille intégrée']] : []),
    ...(cur.ouverture !== 'fixe' ? [['Hauteur de poignée', `${cur.poignee} mm`]] : [])
  ];
  return rows.map(([k,v]) => `
    <div style="display:flex;justify-content:space-between">
      <span style="color:var(--muted)">${k}</span>
      <span style="font-weight:600;color:var(--ink);text-align:right">${v}</span>
    </div>`).join('');
}

function miniCart(){
  if(!S.cart.length) return `<div class="cart-pop">
    <div style="text-align:center;padding:20px 8px;color:var(--muted);font-size:14px">Votre panier est vide</div>
  </div>`;
  const T = totals();
  const n = S.cart.reduce((a,i)=>a+i.qty,0);
  const rows = S.cart.slice(0,4).map(it => `
    <div style="display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="min-width:0">
        <div style="font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${itemTitle(it)}</div>
        <div style="font-size:12px;color:var(--muted)">Qté ${it.qty} × ${eur(it.unit)}</div>
      </div>
      <span style="font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap">${eur(it.total)}</span>
    </div>`).join('');
  const more = S.cart.length > 4 ? `<div style="font-size:12px;color:var(--muted);padding:8px 0 0">+ ${S.cart.length - 4} autre(s) article(s)</div>` : '';
  return `<div class="cart-pop">

          {key:'2v',       label:'2 vantaux', desc:'Ouverture à la française · oscillo-battant inclus'},
          {key:'fixe',     label:'Fixe',      desc:'Châssis non ouvrant'},
          {key:'soufflet', label:'Soufflet',  desc:'Bascule par le haut, entrouverture partielle'}
        ])}
      </div>
    </div>`;

  // Matériau unique (PVC Kömmerling) → plus de sélecteur redondant : l'étape affiche directement le profilé
  const secMateriau = `
    ${cur.matiere === 'pvc' ? `
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:20px;font-weight:700;margin:0;color:var(--ink)">Profilé Kömmerling 76</h3>
        <span style="font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:4px 9px;border-radius:999px">Kömmerling</span>
      </div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.5">${KOMMERLING.note}</p>
      <div style="display:grid;grid-template-columns:repeat(${Object.keys(KOMMERLING.profils).length},1fr);gap:14px">
        ${Object.entries(KOMMERLING.profils).map(([key,v]) => {
          const sel = cur.profil === key;
          return `<div onclick="setField('fenetre','profil','${key}')" style="${cardStyle(sel)}">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span style="font-size:14.5px;font-weight:700;color:var(--ink)">${v.label}</span>${v.add?`<span style="color:var(--accent);font-size:12.5px;font-weight:600">+${v.add} €/m²</span>`:''}
            </div>
            <div style="font-size:12.5px;color:var(--muted);line-height:1.4;margin-top:4px">${v.desc}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:9px">
              <span style="font-size:11px;font-weight:600;color:var(--accent)">${v.uw}</span>
              <span style="font-size:11px;color:var(--muted)">· ${v.chambres}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}`;

  const secFinFenetre = `
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:20px">
      <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:20px;font-weight:700;margin:0 0 6px;color:var(--ink)">Couleur de menuiserie</h3>
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 18px">${couleurName(cur.couleur)}${cur.couleur !== 'blanc' ? ' · '+facesName(cur.faces) : ''}</p>
      <div style="display:flex;gap:14px;flex-wrap:wrap">${swatches('fenetre',['blanc','creme','grisquartz','anthracite','basalte','chocolat','vert','bleu','rouge','chene','noyer','winchester'])}</div>
      ${cur.couleur !== 'blanc' ? `
      <div style="margin-top:22px;padding-top:22px;border-top:1px solid var(--line)">
        <h4 style="font-family:'Schibsted Grotesk',sans-serif;font-size:15px;font-weight:700;margin:0 0 4px;color:var(--ink)">Application du coloris</h4>
        <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5">La teinte est appliquée sur une seule face (extérieur) ou sur les deux faces de la menuiserie.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          ${optCards('fenetre','faces',[
            {key:'2',label:'Deux faces',  desc:'Même teinte à l’intérieur et à l’extérieur (dormant + ouvrant).'},
            {key:'1',label:'Une face',    desc:'Extérieur coloré, intérieur blanc RAL 9016 — plus économique.'}
          ])}
        </div>
      </div>` : ''}
    </div>
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px">
      <div style="display:grid;grid-template-columns:${!['fixe','soufflet'].includes(cur.ouverture) ? '1fr 1fr' : '1fr'};gap:26px">
        <div>
          <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0 0 14px;color:var(--ink)">Vitrage</h3>
          <div style="display:flex;gap:12px">${toggleCards('fenetre','vitrage',[{key:'double',label:'Double'},{key:'triple',label:'Triple'}])}</div>
        </div>
        ${!['fixe','soufflet'].includes(cur.ouverture) ? `
        <div>
          <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0 0 14px;color:var(--ink)">Sens d'ouverture</h3>
          <div style="display:flex;gap:12px">${toggleCards('fenetre','sens',[{key:'gauche',label:'Gauche'},{key:'droite',label:'Droite'}])}</div>
        </div>` : ''}
      </div>
      <div style="margin-top:22px;padding-top:22px;border-top:1px solid var(--line)">
        <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0 0 4px;color:var(--ink)">Seuil bas 20 mm</h3>
        <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5">Seuil aluminium plat de 20 mm pour faciliter le passage (porte-fenêtre, accès PMR).</p>
        <div style="display:flex;gap:12px">${toggleCards('fenetre','seuil',[{key:'non',label:'Sans seuil'},{key:'oui',label:'Seuil 20 mm · +100 €'}])}</div>
      </div>
      <div style="margin-top:22px;padding-top:22px;border-top:1px solid var(--line)">
        <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0 0 4px;color:var(--ink)">Grille de ventilation</h3>
        <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5">Grille d'aération intégrée en traverse haute pour renouveler l'air sans ouvrir la fenêtre.</p>
        <div style="display:flex;gap:12px">${toggleCards('fenetre','grille',[{key:'non',label:'Sans grille'},{key:'oui',label:'Grille de ventilation · +30 €'}])}</div>
      </div>
      ${cur.ouverture !== 'fixe' ? `
      <div style="margin-top:22px;padding-top:22px;border-top:1px solid var(--line)">
        <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0 0 4px;color:var(--ink)">Hauteur de poignée</h3>
        <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5">Position de la poignée mesurée depuis le bas de l'ouvrant, en millimètres.</p>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          ${['180','250','300','400','500','600','700','1000'].map(v => {
            const sel = cur.poignee === v;
            return `<div onclick="setField('fenetre','poignee','${v}')" style="${cardStyle(sel)}flex:0 0 auto;min-width:70px;text-align:center;padding:11px 14px">
              <span style="font-size:14.5px;font-weight:700;color:var(--ink)">${v}</span><span style="font-size:11.5px;color:var(--muted)"> mm</span>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>`;

  // étapes du configurateur
  const steps = isVolet
    ? [ {label:'Dimensions', html:secDims}, {label:'Pose', html:secPose}, {label:'Motorisation', html:secMotor}, {label:'Finitions', html:secFinVolet} ]
    : [ {label:'Dimensions', html:secDims}, {label:'Ouverture', html:secOuverture}, {label:'Profilé', html:secMateriau}, {label:'Finitions', html:secFinFenetre} ];
  const step = Math.min(Math.max(S.step || 0, 0), steps.length - 1);

  const stepper = `<div style="display:flex;align-items:center;margin-bottom:26px">${steps.map((s,i) => {
    const done = i < step, active = i === step;
    const circleBg = (active || done) ? 'var(--accent)' : 'var(--surface)';
    const circleColor = (active || done) ? '#fff' : 'var(--muted)';
    const circle = `<div onclick="setStep(${i})" style="cursor:pointer;display:flex;align-items:center;gap:10px;flex-shrink:0">
        <span style="width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:${circleBg};color:${circleColor};border:${(active||done)?'none':'1px solid var(--line)'}">${done ? '✓' : i+1}</span>
        <span class="step-label" style="font-size:13.5px;font-weight:${active?'700':'600'};color:${active?'var(--ink)':'var(--muted)'};white-space:nowrap">${s.label}</span>
      </div>`;
    const connector = i < steps.length - 1 ? `<div class="step-conn" style="flex:1;height:2px;margin:0 14px;background:${i < step ? 'var(--accent)' : 'var(--line)'}"></div>` : '';
    return circle + connector;
  }).join('')}</div>`;

  const navBtns = `<div style="display:flex;justify-content:space-between;gap:12px;margin-top:24px">
    ${step > 0
      ? `<button onclick="prevStep()" class="neon-btn" style="padding:13px 22px;font-size:14.5px">← Précédent</button>`
      : '<span></span>'}
    ${step < steps.length - 1
      ? `<button onclick="nextStep()" class="neon-btn" style="padding:13px 28px;font-size:14.5px">Suivant →</button>`
      : `<button onclick="addToCart()" class="neon-btn" style="padding:13px 28px;font-size:14.5px">Ajouter au panier →</button>`}
  </div>`;

  const helpCta = `
    <div style="margin-top:20px;background:var(--accent-soft);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;flex-shrink:0">?</span>
        <div>
          <div style="font-size:14.5px;font-weight:700;color:var(--ink)">Une difficulté pour configurer votre ${isVolet ? 'volet' : 'fenêtre'} ?</div>
          <div style="font-size:13px;color:var(--muted);margin-top:1px">Décrivez votre besoin à cette étape, notre équipe vous répond.</div>
        </div>
      </div>
      <button onclick="openHelp()" class="neon-btn" style="padding:11px 18px;font-size:14px;white-space:nowrap">Décrire ma difficulté</button>
    </div>`;

  const leftOptions = stepper + steps[step].html + helpCta + navBtns;

  const helpModal = !S.help.open ? '' : `
    <div onclick="closeHelp()" style="position:fixed;inset:0;z-index:80;background:rgba(15,18,22,.5);display:flex;align-items:center;justify-content:center;padding:20px">
      <div onclick="event.stopPropagation()" style="background:var(--surface);border:1px solid var(--line);border-radius:18px;max-width:480px;width:100%;padding:28px;box-shadow:0 30px 80px -30px rgba(0,0,0,.55)">
        ${S.help.sent ? `
          <div style="text-align:center;padding:6px 0">
            <div style="width:60px;height:60px;border-radius:50%;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px"><span style="color:#fff;font-size:30px;line-height:1">✓</span></div>
            <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:22px;font-weight:800;margin:0 0 10px;color:var(--ink)">Demande envoyée</h3>
            <p style="font-size:15px;color:var(--muted);line-height:1.6;margin:0 0 20px">Merci ! Votre message a été transmis à notre équipe${S.help.email ? `, qui vous répond sur <strong style="color:var(--ink)">${(S.help.email||'').replace(/</g,'&lt;')}</strong>` : ''}. Nous revenons vers vous rapidement.</p>
            <button onclick="closeHelp()" class="neon-btn" style="padding:12px 26px;font-size:14.5px">Fermer</button>
          </div>` : `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px">
            <h3 style="font-family:'Schibsted Grotesk',sans-serif;font-size:21px;font-weight:800;margin:0;color:var(--ink)">Besoin d'aide ?</h3>
            <span onclick="closeHelp()" style="cursor:pointer;font-size:22px;line-height:1;color:var(--muted)">✕</span>
          </div>
          <p style="font-size:14px;color:var(--muted);line-height:1.55;margin:0 0 14px">Décrivez la difficulté que vous rencontrez pour configurer votre ${isVolet ? 'volet roulant' : 'fenêtre'} (mesures, pose, options…). Notre équipe vous recontacte.</p>
          <div style="font-size:12px;color:var(--muted);background:var(--section);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:16px">Étape ${step+1}/${steps.length} · ${isVolet ? 'Volet roulant' : 'Fenêtre'} · ${cur.w} × ${cur.h} mm</div>
          <label style="font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:7px">Votre e-mail (pour la réponse)</label>
          <input value="${(S.help.email||'').replace(/"/g,'&quot;')}" oninput="setHelp('email',event)" placeholder="jean.dupont@email.fr" inputmode="email" style="width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;margin-bottom:14px;background:var(--section);color:var(--ink)">
          <label style="font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:7px">Votre message</label>
          <textarea oninput="setHelp('msg',event)" placeholder="Ex : je ne sais pas comment mesurer la largeur avec un coffre de volet existant…" style="width:100%;min-height:118px;resize:vertical;padding:12px 13px;border:1px solid ${S.help.error ? '#d9453d' : 'var(--line)'};border-radius:9px;font-size:15px;font-family:inherit;background:var(--section);color:var(--ink);line-height:1.5">${(S.help.msg||'').replace(/</g,'&lt;')}</textarea>
          ${S.help.error ? `<div style="color:#d9453d;font-size:13px;margin-top:8px">Merci de décrire votre difficulté avant d'envoyer.</div>` : ''}
          <button onclick="sendHelp()" class="neon-btn" style="width:100%;padding:14px;font-size:15px;margin-top:16px">Envoyer ma demande →</button>
          <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">Transmis à notre équipe · réponse sous 24–48 h ouvrées</div>`}
      </div>
    </div>`;

  return `<main style="max-width:1200px;margin:0 auto;padding:30px 32px 120px" class="anim">
    <div style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--muted);margin-bottom:22px">
      <span onclick="goHome()" class="nav-hover" style="cursor:pointer">Accueil</span><span>/</span>
      <span onclick="${isVolet?"pickProduct('volet')":"pickProduct('fenetre')"}" class="nav-hover" style="cursor:pointer">${isVolet?'Volets roulants':'Fenêtres'}</span><span>/</span>
      <span style="color:var(--ink);font-weight:600">Configurateur</span>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:30px">
      <div style="display:inline-flex;background:var(--section);border:1px solid var(--line);border-radius:10px;padding:5px">
        <button onclick="setProduct('volet')"   style="${isVolet ? TAB_ON : TAB_OFF}">Volet roulant</button>
        <button onclick="setProduct('fenetre')" style="${isVolet ? TAB_OFF : TAB_ON}">Fenêtre</button>
      </div>
      <button onclick="goPieces()" class="neon-btn" style="padding:11px 18px;font-size:14px">Acheter des pièces & moteurs Bubendorff →</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 390px;gap:40px;align-items:start">
      <!-- left panel : étapes -->
      <div>
        ${leftOptions}
      </div>

      <!-- right sticky panel -->
      <aside style="position:sticky;top:184px">
        <div style="background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 18px 50px -34px rgba(0,0,0,.35)">
          ${previewPanel()}
          <div style="display:flex;justify-content:center;gap:16px;font-size:12.5px;color:var(--muted);margin-bottom:20px">
            <span>L ${cur.w} mm</span><span style="color:var(--line)">·</span><span>H ${cur.h} mm</span>
          </div>
          <div style="font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Votre configuration</div>
          <div style="display:flex;flex-direction:column;gap:9px;font-size:14px;margin-bottom:18px">${summaryRows()}</div>

          <div style="border-top:1px solid var(--line);padding-top:16px;margin-bottom:18px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
              <span style="font-size:14px;font-weight:600;color:var(--ink)">Quantité</span>
              <div style="display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden">
                <button onclick="qtyDec()" style="border:none;background:var(--section);width:36px;height:34px;font-size:18px;cursor:pointer;color:var(--ink)">−</button>
                <span style="width:38px;text-align:center;font-weight:700;color:var(--ink)">${cur.qty}</span>
                <button onclick="qtyInc()" style="border:none;background:var(--section);width:36px;height:34px;font-size:18px;cursor:pointer;color:var(--ink)">+</button>
              </div>
            </div>
            <div style="display:flex;align-items:flex-end;justify-content:space-between">
              <span style="font-size:14px;color:var(--muted)">Total TTC</span>
              <span style="font-family:'Schibsted Grotesk',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1">${eur(unitPrice * cur.qty)}</span>
            </div>
            <div style="text-align:right;font-size:12.5px;color:var(--muted);margin-top:2px">soit ${eur(unitPrice)} / unité · TVA incluse</div>
          </div>

          <button onclick="addToCart()" class="neon-btn" style="width:100%;padding:16px;font-size:16px">Ajouter au panier</button>
          <div style="text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px">Devis instantané · sans engagement</div>
        </div>
      </aside>
    </div>

    <!-- barre d'action collante : prix + CTA toujours visibles -->
    <div style="position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -10px 30px -22px rgba(0,0,0,.4)">
      <div style="max-width:1200px;margin:0 auto;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px">
        <div style="font-size:13.5px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <span style="color:var(--ink);font-weight:600">${isVolet ? 'Volet roulant' : 'Fenêtre'}</span> · ${cur.w} × ${cur.h} mm
        </div>
        <div style="display:flex;align-items:center;gap:18px;flex-shrink:0">
          <div style="text-align:right;line-height:1.1">
            <div style="font-family:'Schibsted Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink)">${eur(unitPrice * cur.qty)}</div>
            <div style="font-size:11.5px;color:var(--muted)">TTC · ${cur.qty} ${cur.qty > 1 ? 'unités' : 'unité'}</div>
          </div>
          <button onclick="addToCart()" class="neon-btn" style="padding:13px 28px;font-size:15px;white-space:nowrap">Ajouter au panier</button>
        </div>
      </div>
    </div>
    ${helpModal}
  </main>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// PIÈCES SCREEN (boutique pièces & accessoires Bubendorff)
// ─────────────────────────────────────────────────────────────────────────────
function renderPieces(){
  const inCart = id => { const it = S.cart.find(i => i.product==='piece' && i.pieceId===id); return it ? it.qty : 0; };

  const sections = Object.entries(PIECES).map(([key,cat]) => {
    const cards = cat.items.map(p => {
      const q = inCart(p.id);
      return `<div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column" class="card-hover">
        <div style="aspect-ratio:1/1;background:#fff;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);overflow:hidden">
          <img src="${ASSET}${p.img}" alt="${p.name}" loading="lazy" style="width:100%;height:100%;object-fit:contain;padding:14px;mix-blend-mode:multiply">
        </div>
        <div style="padding:16px 18px 18px;display:flex;flex-direction:column;flex:1">
          <h4 style="font-family:'Schibsted Grotesk',sans-serif;font-size:16px;font-weight:700;margin:0 0 6px;color:var(--ink);line-height:1.25">${p.name}</h4>
          <p style="font-size:13px;line-height:1.5;color:var(--muted);margin:0 0 14px;flex:1">${p.desc}</p>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
            <span style="font-family:'Schibsted Grotesk',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--ink)">${eur(p.price)}</span>
            <button onclick="addPiece('${p.id}')" class="neon-btn" style="padding:10px 16px;font-size:13.5px;white-space:nowrap">${q ? '✓ Ajouté ('+q+')' : 'Ajouter'}</button>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<section style="margin-bottom:46px">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:6px">
        <h2 style="font-family:'Schibsted Grotesk',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--ink)">${cat.label}</h2>
      </div>
      <p style="font-size:14.5px;color:var(--muted);margin:0 0 20px">${cat.intro}</p>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px">${cards}</div>
    </section>`;
  }).join('');

  const count = S.cart.filter(i=>i.product==='piece').reduce((a,i)=>a+i.qty,0);
  const cartBar = count ? `<div style="position:sticky;top:184px;z-index:30;display:flex;justify-content:flex-end;margin-bottom:18px">

// ─────────────────────────────────────────────────────────────────────────────
// HERO SCROLL VELOCITY — d'après 21st.dev — Edil-ozi/scroll-velocity
// Bandes de texte défilant en boucle ; la vitesse/direction réagit au scroll page.
// ─────────────────────────────────────────────────────────────────────────────
let svRaf = null, svScrollVel = 0, svLastY = 0, svScrollBound = false, svResizeBound = false;
function scrollVelocityMount(){
  cancelAnimationFrame(svRaf);
  const tracks = [...document.querySelectorAll('.sv-track')];
  if(!tracks.length) return;                         // pas sur l'accueil → rien à faire

  const PHRASES = ['Qualité','Volets Roulants','Fenêtres Fabriquées en France','Pièces Détachées'];
  const setHTML = PHRASES.map(t => `<span class="sv-item">${t}<span class="sv-dot">•</span></span>`).join('');

  const COPIES = 6;
  const items = tracks.map(el => {
    el.innerHTML = setHTML.repeat(COPIES);           // assez de copies pour couvrir l'écran
    return {
      el,
      dir: parseFloat(el.dataset.dir) || 1,          // 1 = vers la gauche, -1 = vers la droite
      base: 55,                                       // vitesse de fond (px/s)
      pos: 0,
      setW: el.scrollWidth / COPIES || 1             // largeur d'un jeu de phrases
    };
  });
  const remeasure = () => items.forEach(it => { it.setW = it.el.scrollWidth / COPIES || it.setW; });
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(remeasure); // recalcul une fois la police chargée
  if(!svResizeBound){ window.addEventListener('resize', () => scrollVelocityMount(), { passive:true }); svResizeBound = true; }

  if(!svScrollBound){
    svLastY = window.scrollY;
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      svScrollVel += (y - svLastY);                  // accumule la vélocité de scroll
      svLastY = y;
    }, { passive:true });
    svScrollBound = true;
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min((now - last) / 1000, 0.05);  // borne dt (onglet masqué)
    last = now;
    svScrollVel *= 0.9;                               // amortissement
    const skew = Math.max(-7, Math.min(7, svScrollVel * -0.35));
    items.forEach(it => {
      const speed = it.base * it.dir + svScrollVel * it.dir * 4;
      it.pos += speed * dt;
      const w = ((it.pos % it.setW) + it.setW) % it.setW;
      it.el.style.transform = `translateX(${-w}px) skewX(${skew}deg)`;
    });
    svRaf = requestAnimationFrame(loop);
  }
  svRaf = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────────────
// HERO GOOEY TEXT MORPHING — d'après 21st.dev — victorwelander/gooey-text-morphing
// (rAF ; repli : 1er mot affiché en clair si l'onglet est masqué / rAF gelé)
// ─────────────────────────────────────────────────────────────────────────────
let gooeyRaf = null;
function gooeyTextMount(){
  cancelAnimationFrame(gooeyRaf);
  const t1 = document.getElementById('gooey-text1');
  const t2 = document.getElementById('gooey-text2');
  if(!t1 || !t2) return;                           // pas sur l'accueil → rien à faire

  const texts = ['Qualité', 'Volets Roulants', 'Fenêtres Fabriquées en France', 'Pièces Détachées'];
  const morphTime = 1, cooldownTime = 0.55;
  let textIndex = texts.length - 1;
  let time = performance.now();
  let morph = 0, cooldown = cooldownTime;

  t1.textContent = texts[0];   // 1er mot affiché en clair (repli onglet masqué)
  t2.textContent = texts[1];
  t1.style.opacity = '100%'; t1.style.filter = '';
  t2.style.opacity = '0%';   t2.style.filter = '';

  if(matchMedia('(prefers-reduced-motion:reduce)').matches) return; // pas d'animation → 1er mot fixe

  function setMorph(fraction){
    t2.style.filter = `blur(${Math.min(8 / fraction - 8, 100)}px)`;
    t2.style.opacity = `${Math.pow(fraction, 0.4) * 100}%`;
    const f = 1 - fraction;
    t1.style.filter = `blur(${Math.min(8 / f - 8, 100)}px)`;
    t1.style.opacity = `${Math.pow(f, 0.4) * 100}%`;
  }
  function doCooldown(){
    morph = 0;
    t2.style.filter = ''; t2.style.opacity = '100%';
    t1.style.filter = ''; t1.style.opacity = '0%';
  }
  function doMorph(){
    morph -= cooldown; cooldown = 0;
    let fraction = morph / morphTime;
    if(fraction > 1){ cooldown = cooldownTime; fraction = 1; }
    setMorph(fraction);
  }
  function animate(now){
    gooeyRaf = requestAnimationFrame(animate);
    const dt = (now - time) / 1000; time = now;
    const shouldIncrement = cooldown > 0;
    cooldown -= dt;
    if(cooldown <= 0){
      if(shouldIncrement){
        textIndex++;
        t1.textContent = texts[textIndex % texts.length];
        t2.textContent = texts[(textIndex + 1) % texts.length];
      }
      doMorph();
    } else {
      doCooldown();
    }
  }
  time = performance.now();
  gooeyRaf = requestAnimationFrame(animate);
}

// ─────────────────────────────────────────────────────────────────────────────
// HERO SPARKLES — champ d'étincelles canvas (d'après Aceternity / 21st.dev)
// ─────────────────────────────────────────────────────────────────────────────
let sparkles = { raf:null, onResize:null };

function sparklesMount(){
  cancelAnimationFrame(sparkles.raf);
  if(sparkles.onResize){ window.removeEventListener('resize', sparkles.onResize); sparkles.onResize = null; }

  const cv = document.getElementById('sparkles-canvas');
  if(!cv) return;
  const ctx = cv.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0, parts = [];

  function build(){
    const r = cv.getBoundingClientRect();
    W = r.width; H = r.height;
    if(!W || !H) return;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const count = Math.round((W * H) / 380); // densité des particules
    parts = [];
    for(let i = 0; i < count; i++){
      parts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        s: 0.4 + Math.random() * 0.9,           // taille 0.4–1.3px
        o: Math.random(),                         // opacité courante
        d: 0.004 + Math.random() * 0.02,          // vitesse de scintillement
        up: Math.random() < 0.5
      });
    }
  }

  function tick(){
    if(W && H){
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      for(const p of parts){
        p.o += p.up ? p.d : -p.d;
        if(p.o >= 1){ p.o = 1; p.up = false; }
        else if(p.o <= 0){ p.o = 0; p.up = true; }
        ctx.globalAlpha = p.o;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    sparkles.raf = requestAnimationFrame(tick);
  }

  // double rAF : attend que le canvas ait une taille réelle avant de mesurer
  requestAnimationFrame(() => requestAnimationFrame(() => { build(); }));
  sparkles.onResize = () => { if(document.getElementById('sparkles-canvas') === cv) build(); };
  window.addEventListener('resize', sparkles.onResize);
  tick();
}

// ─────────────────────────────────────────────────────────────────────────────
// CARROUSEL CIRCULAIRE (savoir-faire) — d'après Northstrix/circular-testimonials
// ─────────────────────────────────────────────────────────────────────────────
let savoir = { idx:0, timer:null };

function savoirApply(){
  const c = document.getElementById('savoir-carousel');
  if(!c) return;
  const imgs = c.querySelectorAll('img[data-index]');
  const n = imgs.length; if(!n) return;
  const gap = 70, maxStickUp = gap * 0.8;           // léger décalage vertical des images du fond
  imgs.forEach(img => {
    let offset = (+img.dataset.index) - savoir.idx;
    if(offset >  n/2) offset -= n;
    if(offset < -n/2) offset += n;
    const z = n - Math.abs(offset);
    const opacity = offset === 0 ? 1 : 0.7;
    const scale   = offset === 0 ? 1 : 0.85;
    const h = img.offsetHeight || 300;
    let tx = '0%', ty = '0%', ry = 0;
    if(offset > 0){ tx = '20%';  ty = `-${(maxStickUp/h)*100}%`; ry = -15; }
    else if(offset < 0){ tx = '-20%'; ty = `-${(maxStickUp/h)*100}%`; ry = 15; }
    img.style.zIndex  = z;
    img.style.opacity = opacity;
    img.style.transform = `translate(-50%,-50%) translateX(${tx}) translateY(${ty}) scale(${scale}) rotateY(${ry}deg)`;
  });
}

function savoirNav(dir){
  const c = document.getElementById('savoir-carousel');
  if(!c) return;
  const n = c.querySelectorAll('img[data-index]').length;
  savoir.idx = (savoir.idx + dir + n) % n;
  savoirApply();
  savoirAutoplay(); // relance le minuteur après action manuelle
}

function savoirAutoplay(){
  clearInterval(savoir.timer);
  savoir.timer = setInterval(() => {
    const c = document.getElementById('savoir-carousel');
    if(!c){ clearInterval(savoir.timer); return; }
    const n = c.querySelectorAll('img[data-index]').length;
    savoir.idx = (savoir.idx + 1) % n;
    savoirApply();
  }, 5000);
}

function savoirMount(){
  clearInterval(savoir.timer);
  const c = document.getElementById('savoir-carousel');
  if(!c){ return; }
  savoir.idx = 0;
  // double rAF : attend que les <img> aient une hauteur pour calculer le décalage vertical
  requestAnimationFrame(() => requestAnimationFrame(savoirApply));
  savoirAutoplay();
}

// Boot
_render();
</script>
